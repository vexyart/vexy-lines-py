site_name: "vexy-lines-py"
site_description: "Pure-Python parser for Vexy Lines .lines vector art files"
theme:
  custom_dir: overrides
  name: materialx
  features:
    - content.code.copy
    - navigation.sections
  palette:
    - scheme: slate
      primary: teal
      toggle:
        icon: material/brightness-7
        name: Light mode
    - scheme: default
      primary: teal
      toggle:
        icon: material/brightness-4
        name: Dark mode
docs_dir: src_docs
site_dir: docs
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.superfences
  - admonition
  - toc:
      permalink: true
nav:
  - Overview: index.md
  - Installation: installation.md
  - API Reference: api-reference.md
  - File Format: file-format.md
  - Examples: examples.md
  - Changelog: changelog.md
